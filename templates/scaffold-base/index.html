<!doctype html>
<html lang="en" data-theme="studio" data-layout="3col" data-persona="default">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{PRODUCT_NAME}}</title>
  <meta name="description" content="{{ONE_LINE_PITCH}}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family={{HEADING_FONT}}:wght@500;700&family={{BODY_FONT}}:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface:  'rgb(var(--surface)  / <alpha-value>)',
            elevated: 'rgb(var(--elevated) / <alpha-value>)',
            accent:   'rgb(var(--accent)   / <alpha-value>)',
            muted:    'rgb(var(--muted)    / <alpha-value>)',
            ink:      'rgb(var(--ink)      / <alpha-value>)',
            ink2:     'rgb(var(--ink2)     / <alpha-value>)',
          },
          fontFamily: {
            heading: ['{{HEADING_FONT}}', 'serif'],
            body:    ['{{BODY_FONT}}', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            proto: 'var(--radius)',
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/feedback.css" />
</head>
<body class="bg-surface text-ink font-body antialiased">

  <!-- NAV -->
  <header class="border-b border-muted/20">
    <nav class="mx-auto max-w-6xl px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-heading text-lg font-bold tracking-tight">{{PRODUCT_NAME}}</a>
      <ul class="hidden md:flex gap-6 text-sm">
        <li><a href="index.html" class="hover:text-accent">Home</a></li>
        <!-- add nav items as screens grow -->
      </ul>
      <a href="#" class="rounded-proto bg-accent text-surface px-4 py-2 text-sm font-medium hover:opacity-90">Get started</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="mx-auto max-w-6xl px-6 py-16">
    <section class="max-w-2xl">
      <h1 class="font-heading text-5xl font-bold tracking-tight leading-tight">{{HERO_HEADLINE}}</h1>
      <p class="mt-6 text-lg text-ink2 leading-relaxed">{{HERO_SUB}}</p>
      <div class="mt-8 flex gap-3">
        <a href="#" class="rounded-proto bg-accent text-surface px-5 py-3 font-medium">Primary action</a>
        <a href="#" class="rounded-proto border border-muted/30 px-5 py-3 font-medium">Secondary</a>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="border-t border-muted/20 mt-24">
    <div class="mx-auto max-w-6xl px-6 py-8 flex items-center justify-between text-sm text-ink2">
      <span>&copy; {{PRODUCT_NAME}} — prototype</span>
      <span>Built with <a href="https://github.com/kurenn/claude-prototype" class="underline">claude-prototype</a></span>
    </div>
  </footer>

  <!-- VISIBLE CONTROL BAR — bottom-center, all options shown at once.
       Edit the `data-theme-option` and `data-layout-option` buttons to match
       the themes/layouts defined in theme.js + layout.js. -->
  <div id="proto-controls">
    <div class="proto-bar">
      <div class="proto-bar-section">
        <span class="proto-bar-label">Theme</span>
        <div class="proto-seg-group">
          <button class="proto-seg" data-theme-option="studio"   aria-pressed="true">Studio</button>
          <button class="proto-seg" data-theme-option="terminal" aria-pressed="false">Terminal</button>
          <button class="proto-seg" data-theme-option="mono"     aria-pressed="false">Mono</button>
        </div>
      </div>
      <div class="proto-bar-section">
        <span class="proto-bar-label">Layout</span>
        <div class="proto-seg-group">
          <button class="proto-seg" data-layout-option="2col" aria-pressed="false">2 col</button>
          <button class="proto-seg" data-layout-option="3col" aria-pressed="true">3 col</button>
        </div>
      </div>
      <div class="proto-bar-section">
        <span class="proto-bar-label">Persona</span>
        <div class="proto-seg-group">
          <button class="proto-seg" data-persona-option="default" aria-pressed="true">Default</button>
          <button class="proto-seg" data-persona-option="empty"   aria-pressed="false">Empty</button>
        </div>
      </div>
      <div class="proto-bar-section">
        <button class="proto-seg" data-share title="Copy shareable URL">🔗 Share</button>
        <button class="proto-seg" data-feedback-toggle title="Toggle feedback mode">💬 Feedback</button>
      </div>
    </div>
    <p class="proto-hint">Shift + ? · recent screens</p>
  </div>

  <script src="js/state.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/data.js"></script>
  <script src="js/persona.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/feedback.js"></script>
</body>
</html>
